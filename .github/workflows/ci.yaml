name: GitHub CI
on:
  push:
    branches:
      - develop
      - main
      - hotfix/**
  pull_request:
    branches:
      - develop
      - main

jobs:
  test-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      REGION: asia-southeast1
      AR_REPO: app-images
      IMAGE_NAME: streamlit-poc
      GCP_PROJECT: common-cicd-491718

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-ci@common-cicd-491718.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build -t ${REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}:${{ github.sha }}

      - name: Create Cloud Deploy release via Cloud Build
        if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/hotfix/') || github.ref == 'refs/heads/main'
        run: |
          gcloud builds submit --config cloudbuild.release.yaml \
